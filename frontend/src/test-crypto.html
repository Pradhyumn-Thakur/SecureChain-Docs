<!DOCTYPE html>
<html>
<head>
    <title>Crypto Test</title>
</head>
<body>
    <h1>Crypto Module Tests</h1>
    <div id="results"></div>
    
    <script type="module">
        import CryptoUtils from './utils/crypto.js';
        
        const results = document.getElementById('results');
        
        async function runTests() {
            results.innerHTML = '<h2>Running tests...</h2>';
            
            try {
                // Test 1: Key Generation
                console.log('Test 1: Key Generation');
                const key = await CryptoUtils.generateKey();
                console.log('✅ Key generated:', key);
                
                // Test 2: Key Export/Import
                console.log('\nTest 2: Key Export/Import');
                const exported = await CryptoUtils.exportKey(key);
                console.log('✅ Exported key:', exported);
                const imported = await CryptoUtils.importKey(exported);
                console.log('✅ Key imported successfully');
                
                // Test 3: Encryption/Decryption
                console.log('\nTest 3: Encryption/Decryption');
                const testData = new TextEncoder().encode('Hello, World!');
                const encrypted = await CryptoUtils.encrypt(testData, key);
                console.log('✅ Data encrypted, size:', encrypted.byteLength);
                const decrypted = await CryptoUtils.decrypt(encrypted, imported);
                const decryptedText = new TextDecoder().decode(decrypted);
                console.log('✅ Decrypted text:', decryptedText);
                
                // Test 4: Hash Calculation
                console.log('\nTest 4: Hash Calculation');
                const hash = await CryptoUtils.calculateHash(testData);
                console.log('✅ Hash calculated:', hash);
                
                // Test 5: File Encryption
                console.log('\nTest 5: File Encryption (simulated)');
                const blob = new Blob(['Test file content'], { type: 'text/plain' });
                const file = new File([blob], 'test.txt');
                const encryptedFile = await CryptoUtils.encryptFile(file, key, (p) => {
                    console.log(`Progress: ${p}%`);
                });
                console.log('✅ File encrypted, size:', encryptedFile.size);
                
                results.innerHTML = '<h2>✅ All tests passed! Check console for details.</h2>';
                
            } catch (error) {
                console.error('❌ Test failed:', error);
                results.innerHTML = `<h2>❌ Test failed: ${error.message}</h2>`;
            }
        }
        
        runTests();
    </script>
</body>
</html>
